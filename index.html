<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ysabeau+Infant:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">
    <title>Gallery - Hafsa Abbasi</title>
    <style>
      * { cursor: none !important; box-sizing: border-box; margin: 0; padding: 0; }

      .custom-cursor { position:fixed; width:8px; height:8px; background:rgba(255,215,0,0.9); border-radius:50%; pointer-events:none; z-index:100000; transition:transform 0.15s ease-out; box-shadow:0 0 15px rgba(255,215,0,0.6),0 0 25px rgba(255,215,0,0.3); }
      .cursor-ring { position:fixed; width:40px; height:40px; border:1px solid rgba(255,215,0,0.4); border-radius:50%; pointer-events:none; z-index:99999; transition:all 0.2s ease-out; box-shadow:0 0 20px rgba(255,215,0,0.2); }
      .cursor-sparkle { position:fixed; width:4px; height:4px; background:rgba(255,215,0,0.8); border-radius:50%; pointer-events:none; z-index:99997; animation:sparkle-fade 0.8s ease-out forwards; }
      @keyframes sparkle-fade { 0%{opacity:1;transform:scale(1);} 100%{opacity:0;transform:scale(0.3);} }
      .cursor-ring.hover { width:60px; height:60px; border-color:rgba(255,215,0,0.7); border-width:2px; }
      .custom-cursor.hover { transform:scale(0.6); background:rgba(255,215,0,1); }

      #starfield { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none; }

      body { background:#000; color:#fff; font-family:'Ysabeau Infant',sans-serif; min-height:100vh; }

      @font-face { font-family:'TheScientist'; src:url('TheScientist-L3EyW.woff') format('woff'),url('TheScientist-L3EyW.ttf') format('truetype'); }

      .scroll-progress { position:fixed; top:0; right:60px; height:100vh; width:2px; background:rgba(255,215,0,0.1); z-index:50; pointer-events:none; }
      .progress-line { position:absolute; top:0; left:0; width:100%; height:0%; background:linear-gradient(180deg,rgba(133,120,150,0.3) 0%,rgba(133,120,150,0.8) 50%,rgba(133,120,150,1) 100%); transition:height 0.1s ease-out; }
      .progress-glow { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:8px; height:8px; background:rgba(133,120,150,1); border-radius:50%; box-shadow:0 0 15px rgba(133,120,150,0.8); opacity:0; transition:bottom 0.1s ease-out,opacity 0.3s ease-out; }

      .close-btn { position:fixed; top:40px; right:100px; font-size:40px; color:rgba(255,169,88,1); text-decoration:none; z-index:100; transition:transform 0.3s,color 0.3s; font-weight:300; line-height:1; }
      .close-btn:hover { transform:rotate(90deg); color:rgba(255,215,0,1); }

      /* PAGE */
      .page-wrapper { max-width:1200px; margin:0 auto; padding:0 60px 120px; }

      /* HEADER */
      .page-header { padding-top:140px; padding-bottom:60px; }
      .project-title { font-family:'TheScientist',cursive; font-size:52px; color:rgba(255,169,88,1); margin-bottom:14px; }
      .page-subtitle { font-size:14px; color:rgba(255,255,255,0.4); letter-spacing:1px; font-weight:300; }

      /* MASONRY GRID — CSS columns */
      .masonry {
        columns: 3;
        column-gap: 16px;
      }

      .masonry-item {
        break-inside: avoid;
        margin-bottom: 16px;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        cursor: zoom-in !important;
        border: 1px solid rgba(255,169,88,0.08);
      }

      /* Vary the first item in every 5 to span feel */
      .masonry-item:nth-child(7n+1) { margin-bottom: 16px; }

      .masonry-item img {
        width: 100%;
        height: auto;
        display: block;
        transition: transform 0.5s ease, filter 0.4s ease;
      }

      /* Gold shimmer on hover */
      .masonry-item::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(255,169,88,0.0);
        transition: background 0.3s ease;
        pointer-events: none;
        border-radius: 12px;
      }

      .masonry-item:hover img { transform: scale(1.04); filter: brightness(0.85); }
      .masonry-item:hover::after { background: rgba(255,169,88,0.06); }

      /* Expand icon on hover */
      .masonry-item .expand-icon {
        position: absolute;
        bottom: 12px; right: 12px;
        width: 32px; height: 32px;
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,169,88,0.4);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s ease;
        pointer-events: none;
      }
      .masonry-item:hover .expand-icon { opacity: 1; }
      .expand-icon svg { width:14px; height:14px; color:rgba(255,169,88,0.9); }

      /* Banner item — full width below masonry */
      .banner-item {
        width: 70%;
        margin: 8px auto 0;
        display: block;
      }

      /* LIGHTBOX */
      .lightbox {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.96);
        z-index: 200000;
        display: flex; align-items: center; justify-content: center;
        opacity: 0; pointer-events: none;
        transition: opacity 0.3s ease;
        backdrop-filter: blur(16px);
      }
      .lightbox.active { opacity:1; pointer-events:all; }

      .lightbox-img-wrap {
        position: relative;
        max-width: 88vw; max-height: 88vh;
        display: flex; align-items: center; justify-content: center;
      }

      .lightbox img {
        max-width: 88vw; max-height: 88vh;
        border-radius: 12px;
        box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        transform: scale(0.96); transition: transform 0.3s ease;
        object-fit: contain;
        cursor: zoom-out !important;
        display: block;
      }
      .lightbox.active img { transform: scale(1); }

      /* Close */
      .lightbox-close {
        position: fixed; top:32px; right:60px;
        font-size:40px; color:rgba(255,169,88,1);
        background:none; border:none; z-index:200001;
        transition:transform 0.3s,color 0.3s; font-weight:300; line-height:1;
      }
      .lightbox-close:hover { transform:rotate(90deg); color:rgba(255,215,0,1); }

      /* Prev / Next arrows */
      .lightbox-nav {
        position: fixed;
        top: 50%; transform: translateY(-50%);
        background: rgba(0,0,0,0.4);
        border: 1px solid rgba(255,169,88,0.25);
        border-radius: 50%;
        width: 52px; height: 52px;
        display: flex; align-items: center; justify-content: center;
        color: rgba(255,169,88,0.8);
        transition: all 0.3s ease;
        z-index: 200001;
      }
      .lightbox-nav:hover { background:rgba(255,169,88,0.1); border-color:rgba(255,169,88,0.6); color:rgba(255,169,88,1); }
      .lightbox-nav svg { width:20px; height:20px; }
      #lightboxPrev { left: 24px; }
      #lightboxNext { right: 24px; }

      /* Counter */
      .lightbox-counter {
        position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
        font-size: 12px; letter-spacing: 2px; color: rgba(255,169,88,0.4);
        z-index: 200001;
      }
    </style>

    <script>
      const cursor=document.querySelector('.custom-cursor');const cursorRing=document.querySelector('.cursor-ring');
      let mouseX=0,mouseY=0,ringX=0,ringY=0;
      document.addEventListener('mousemove',(e)=>{mouseX=e.clientX;mouseY=e.clientY;cursor.style.left=mouseX+'px';cursor.style.top=mouseY+'px';if(Math.random()>0.85)createSparkle(mouseX,mouseY);});
      function animateRing(){ringX+=(mouseX-ringX)*0.15;ringY+=(mouseY-ringY)*0.15;cursorRing.style.left=(ringX-20)+'px';cursorRing.style.top=(ringY-20)+'px';requestAnimationFrame(animateRing);}
      animateRing();
      function createSparkle(x,y){const s=document.createElement('div');s.className='cursor-sparkle';s.style.left=x+'px';s.style.top=y+'px';document.body.appendChild(s);setTimeout(()=>s.remove(),800);}
      document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',()=>{cursor.classList.add('hover');cursorRing.classList.add('hover');});el.addEventListener('mouseleave',()=>{cursor.classList.remove('hover');cursorRing.classList.remove('hover');});});
    </script>

    <script>
      // LIGHTBOX with keyboard + prev/next
      const lightbox=document.getElementById('lightbox');
      const lightboxImg=document.getElementById('lightboxImg');
      const lightboxClose=document.getElementById('lightboxClose');
      const lightboxPrev=document.getElementById('lightboxPrev');
      const lightboxNext=document.getElementById('lightboxNext');
      const lightboxCounter=document.getElementById('lightboxCounter');

      const allImgs = Array.from(document.querySelectorAll('.masonry-item img'));
      let currentIndex = 0;

      function openLightbox(index) {
        currentIndex = index;
        lightboxImg.src = allImgs[currentIndex].src;
        lightboxImg.alt = allImgs[currentIndex].alt;
        lightboxCounter.textContent = (currentIndex + 1) + ' / ' + allImgs.length;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
      }

      function prevImage() {
        currentIndex = (currentIndex - 1 + allImgs.length) % allImgs.length;
        lightboxImg.style.opacity = '0';
        setTimeout(() => {
          lightboxImg.src = allImgs[currentIndex].src;
          lightboxCounter.textContent = (currentIndex + 1) + ' / ' + allImgs.length;
          lightboxImg.style.opacity = '1';
        }, 150);
      }

      function nextImage() {
        currentIndex = (currentIndex + 1) % allImgs.length;
        lightboxImg.style.opacity = '0';
        setTimeout(() => {
          lightboxImg.src = allImgs[currentIndex].src;
          lightboxCounter.textContent = (currentIndex + 1) + ' / ' + allImgs.length;
          lightboxImg.style.opacity = '1';
        }, 150);
      }

      lightboxImg.style.transition = 'opacity 0.15s ease';

      allImgs.forEach((img, i) => {
        img.parentElement.addEventListener('click', () => openLightbox(i));
      });

      lightboxClose.addEventListener('click', closeLightbox);
      lightboxPrev.addEventListener('click', prevImage);
      lightboxNext.addEventListener('click', nextImage);
      lightbox.addEventListener('click', (e) => { if(e.target === lightbox) closeLightbox(); });
      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'ArrowRight') nextImage();
      });
    </script>

    <script>
      const canvas=document.getElementById('starfield');const ctx=canvas.getContext('2d');
      let stars=[],shootingStars=[],scrollY=0;
      function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;initStars();}
      function initStars(){stars=[];for(let i=0;i<400;i++){const r=Math.random();let size=r<0.7?Math.random()*0.8+0.3:r<0.9?Math.random()*1.2+0.8:Math.random()*1.8+1.2;stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height*3,size,speed:Math.random()*0.5+0.1,brightness:Math.random()*0.3+0.25,twinkle:Math.random()*Math.PI*2,twinkleSpeed:Math.random()*0.02+0.01});}}
      function createShootingStar(){const s=Math.random();let sx=s<0.5?Math.random()*canvas.width*0.3:canvas.width*0.7+Math.random()*canvas.width*0.3,sy=Math.random()*canvas.height*0.3;shootingStars.push({x:sx,y:sy,endX:s<0.5?sx+200+Math.random()*300:sx-200-Math.random()*300,endY:sy+200+Math.random()*300,progress:0,speed:0.015+Math.random()*0.01,opacity:1});}
      function drawShootingStars(){shootingStars.forEach((star,i)=>{star.progress+=star.speed;if(star.progress>1)star.opacity-=0.05;if(star.opacity<=0){shootingStars.splice(i,1);return;}const cx=star.x+(star.endX-star.x)*star.progress,cy=star.y+(star.endY-star.y)*star.progress,tx=cx-(star.endX-star.x)*0.05,ty=cy-(star.endY-star.y)*0.05;const g=ctx.createLinearGradient(tx,ty,cx,cy);g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(0.5,`rgba(255,255,255,${0.3*star.opacity})`);g.addColorStop(1,`rgba(255,255,255,${0.8*star.opacity})`);ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(cx,cy);ctx.strokeStyle=g;ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(cx,cy,2,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${star.opacity})`;ctx.shadowBlur=10;ctx.shadowColor='#fff';ctx.fill();ctx.shadowBlur=0;});}
      function drawStars(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);stars.forEach(star=>{const yPos=(star.y-scrollY*star.speed)%(canvas.height+500);star.twinkle+=star.twinkleSpeed;const tf=0.8+Math.sin(star.twinkle)*0.2;ctx.beginPath();ctx.arc(star.x,yPos,star.size,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${star.brightness*tf})`;ctx.fill();if(star.size>1){ctx.shadowBlur=4*tf;ctx.shadowColor='#fff';ctx.fill();ctx.shadowBlur=0;}});drawShootingStars();}
      function animate(){drawStars();requestAnimationFrame(animate);}
      window.addEventListener('scroll',()=>{scrollY=window.scrollY;});
      window.addEventListener('resize',resizeCanvas);
      resizeCanvas();animate();
      setInterval(()=>{if(Math.random()>0.3)createShootingStar();},8000);
    </script>

    <script>
      const progressLine=document.querySelector('.progress-line');const progressGlow=document.querySelector('.progress-glow');
      function updateProgress(){const pct=(window.pageYOffset/(document.documentElement.scrollHeight-window.innerHeight))*100;progressLine.style.height=pct+'%';progressGlow.style.opacity=pct>2?'1':'0';progressGlow.style.bottom=(100-pct)+'%';}
      window.addEventListener('scroll',updateProgress);window.addEventListener('resize',updateProgress);updateProgress();
    </script>
